<div class="card shadow-sm">
<img
    src="{{ auction.image_url }}"
    class="bd-placeholder-img card-img-top"
    style="max-height: 225px; object-fit: cover;"
    alt="{{ auction.description }}"
/>

<div class="card-body">
    <h5 class="card-title">{{ auction.description }}</h5>
    <p class="card-text">
    Starting Bid: ${{ auction.starting_bid }}
    <br />Duration: {{ auction.auction_duration }} days.
    </p>
    <div
    class="d-flex justify-content-between align-items-center"
    >
    <div class="btn-group">
        <a type="button"
        href="{{ url_for('auctions_bp.auction_details', auction_id=auction.id) }}"
        class="btn btn-primary">
        View
        </a>
        <a type="button"
        href="{{ url_for('auctionadmin_bp.delete_auction', auction_id=auction.id) }}"
        class="btn btn-danger">
        Delete
        </a>
    </div>
    </div>
</div>
</div>
