<div class="d-grid flex-column gap-2 d-md-flex justify-content-md-start">
  <div class="card mb-2" style="width: 18rem">
    <div class="card-body">
      <h5 class="card-title">Bid: ${{ bid.amount }}</h5>
      <h6 class="card-subtitle mb-2 text-body-secondary">
        By: {{ bid.username }}
      </h6>
      <p class="card-text">
        <small class="text-body-secondary">At: {{ bid.created_at }}</small>
      </p>
        {% if current_user.is_authenticated and current_user.role == 'admin' %}

        <form
    class="my-2"
    method="post"
    action="{{ url_for('auctions_bp_sqlalchemy.delete_bid', bid_id=bid.id, auction_id=auction.id) }}"
  >
    <button type="submit" class="btn btn-danger mb-4">Delete Bid {{ bid.id }}</button>
  </form>
        {% endif %}
    </div>
  </div>
</div>
