<div class="card shadow-sm">
<img
    src="{{ auction.image_url }}"
    class="bd-placeholder-img card-img-top"
    style="max-height: 225px; object-fit: cover;"
    alt="{{ auction.description }}"
/>

<div class="card-body">
    <h5 class="card-title">{{ auction.description }}</h5>
    <p class="card-text">
    Starting Bid: {{ auction.starting_bid }} kr.<br />
    <br />Ends at: {{ auction.end_time }}.
    </p>
    <div
    class="d-flex justify-content-between align-items-center"
    >
    <div class="btn-group">
        <a type="button"
        href="{{ url_for('auctions_bp_sqlalchemy.get_auction_by_id', auction_id=auction.id) }}"
        class="btn btn-primary">
        View
        </a>
        {% if current_user.is_authenticated and current_user.role == 'admin' %}
        <a type="button"
        href="{{ url_for('auctions_bp_sqlalchemy.edit_auction', auction_id=auction.id) }}"
        class="btn btn-warning">
        Edit
        </a>
        <a type="button"
        href="{{ url_for('auctions_bp_sqlalchemy.delete_auction', auction_id=auction.id) }}"
        class="btn btn-danger">
        Delete
        </a>
        {% endif %}
    </div>
    </div>
</div>
</div>
