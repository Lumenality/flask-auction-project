{% extends "base_flask.html" %}
{% block title %} Placing bid on auction {{ auction_id }} {% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">Place a Bid</h2>
            <form action="{{ url_for('auctions_bp_sqlalchemy.add_bid', auction_id=auction_id) }}" method="post">

                <div class="mb-3">
                    <label for="amount" class="form-label">Bid Amount:</label>
                    <input type="number"
                           class="form-control"
                           id="amount"
                           name="amount"
                           required
                           min="{{ suggested_amount }}"
                           value="{{ suggested_amount }}"
                           placeholder="{{ suggested_amount }}"
                           >
                    
                </div>

                <button type="submit" class="btn btn-primary">Place Bid</button>
                <a href="{{ url_for('auctions_bp_sqlalchemy.get_all_auctions') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
