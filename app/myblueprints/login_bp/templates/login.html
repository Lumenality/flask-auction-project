<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Import bootstrap script and style from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js""></script>

    <title>Login</title>
</head>
<body>
    <div class="container mt-3">
    <h1>Login</h1>
    {{loginmessage}}

        <form method="POST" action="{{ url_for('login_bp.py')}}">
            {{ form.hidden_tag() }}
            <div class="form-group">
                {{ form.username.label }}
                {{ form.username(class="form-control", placeholder="Enter your username", required=true) }}
            </div>
            <div class="form-group">
                {{ form.password.label }}
                {{ form.password(class="form-control", placeholder="Enter your password", required=true) }}
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
    </form>
    </div>
</body>
</html>
