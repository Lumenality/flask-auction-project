{% extends 'baselayout.html' %}

{% block title %} Add Auction {% endblock %}

{% block content %}
<form action="{{ url_for('auctions_bp_sqlalchemy.add_auction') }}" method="post">
    <label for="id">ID:</label>
    <input type="text" id="id" name="id" required><br>

    <label for="description">Description:</label>
    <input type="text" id="description" name="description" required><br>

    <label for="starting_bid">Starting Bid:</label>
    <input type="number" id="starting_bid" name="starting_bid" required><br>

    <label for="duration">Auction Duration (days):</label>
    <input type="number" id="duration" name="duration" required><br>

    <label for="image_url">Image URL:</label>
    <input type="text" id="image_url" name="image_url"><br>

    <input type="submit" value="Add Auction">
</form>
<button class="secondary">To all auctions</button>
{% endblock %}
