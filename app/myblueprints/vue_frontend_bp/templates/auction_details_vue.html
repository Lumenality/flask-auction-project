{% extends 'base_vue.html' %}
{% block title %}Auction Details - {{ auction_title }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb breadcrumb-chevron p-3 bg-body-tertiary rounded-3">
    <li class="breadcrumb-item">
      <a class="link-body-emphasis" href="/">
        <i class="bi bi-house-door-fill"></i>
        <span class="visually-hidden">Home</span>
      </a>
    </li>
    <li class="breadcrumb-item">
      <a
        class="link-body-emphasis fw-semibold text-decoration-none"
        href="/auctions"
        >Auctions</a
      >
    </li>
    <li class="breadcrumb-item active" aria-current="page">{{ auction_title }}</li>
  </ol>
</nav>
<auction-details auction-id="{{ auction_id }}"></auction-details>
{% endblock %}
